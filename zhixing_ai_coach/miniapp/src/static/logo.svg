<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0f3460"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e94560"/>
      <stop offset="100%" stop-color="#ff6b6b"/>
    </linearGradient>
  </defs>

  <!-- 背景圆 -->
  <circle cx="100" cy="100" r="96" fill="url(#bg)"/>

  <!-- 哑铃图标 -->
  <!-- 左边铃片 -->
  <rect x="35" y="70" width="12" height="60" rx="6" fill="url(#accent)"/>
  <rect x="42" y="65" width="6" height="70" rx="3" fill="#fff" opacity="0.3"/>

  <!-- 右边铃片 -->
  <rect x="153" y="70" width="12" height="60" rx="6" fill="url(#accent)"/>
  <rect x="152" y="65" width="6" height="70" rx="3" fill="#fff" opacity="0.3"/>

  <!-- 杠铃杆 -->
  <rect x="48" y="87" width="104" height="26" rx="13" fill="#fff"/>
  <rect x="48" y="95" width="104" height="4" rx="2" fill="url(#accent)" opacity="0.5"/>

  <!-- AI 字母 -->
  <text x="100" y="135" font-family="Arial, sans-serif" font-size="18" font-weight="900" fill="url(#accent)" text-anchor="middle">AI</text>

  <!-- 知行文字 -->
  <text x="100" y="168" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="22" font-weight="700" fill="#fff" text-anchor="middle" letter-spacing="6">知行</text>
</svg>
