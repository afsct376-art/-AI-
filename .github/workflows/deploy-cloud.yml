name: Deploy Cloud Functions

on:
  push:
    branches: [main]
    paths:
      - 'zhixing_ai_coach/cloudfunctions/**'
  workflow_dispatch:

jobs:
  deploy-cloud:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install CloudBase CLI
        run: npm i -g @cloudbase/cli

      - name: Deploy cloud functions
        run: |
          cd zhixing_ai_coach/cloudfunctions
          tcb functions:deploy app -e ${{ secrets.CLOUDBASE_ENV_ID }} --use-cache
        env:
          CLOUDBASE_API_KEY_ID: ${{ secrets.CLOUDBASE_SECRET_ID }}
          CLOUDBASE_API_KEY: ${{ secrets.CLOUDBASE_SECRET_KEY }}
