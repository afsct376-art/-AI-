name: Deploy Mini Program

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          cd zhixing_ai_coach/miniapp
          npm ci

      - name: Build mp-weixin
        run: |
          cd zhixing_ai_coach/miniapp
          npx uni build --platform mp-weixin

      - name: Upload to WeChat
        uses: wechat-miniprogram/miniprogram-ci@v3
        with:
          appid: wxac7dfd7d6435c82a
          private-key: ${{ secrets.WECHAT_PRIVATE_KEY }}
          project-path: zhixing_ai_coach/miniapp/dist/build/mp-weixin
          version: 1.0.${{ github.run_number }}
          desc: ${{ github.event.head_commit.message || '自动部署' }}
