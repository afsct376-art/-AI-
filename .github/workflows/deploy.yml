name: Deploy Mini Program

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          cd zhixing_ai_coach/miniapp
          npm ci

      - name: Build mp-weixin
        run: |
          cd zhixing_ai_coach/miniapp
          npx uni build --platform mp-weixin

      - name: Install miniprogram-ci
        run: npm install -g miniprogram-ci

      - name: Save private key
        run: |
          echo "${{ secrets.WECHAT_PRIVATE_KEY }}" > /tmp/private.key

      - name: Upload to WeChat
        run: |
          miniprogram-ci upload \
            --appid wxac7dfd7d6435c82a \
            --pkp /tmp/private.key \
            --project-path zhixing_ai_coach/miniapp/dist/build/mp-weixin \
            --version 1.0.${{ github.run_number }} \
            --desc "${{ github.event.head_commit.message || '自动部署' }}" \
            --force
